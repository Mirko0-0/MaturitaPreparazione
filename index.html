<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>counter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: monospace;
  background: #fff;
  color: #111;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  transition: background 0.3s;
  position: relative;
  z-index: 10;
  text-align: center;
}

#label {
  font-size: 12px;
  color: #999;
  margin-bottom: 0.5rem;
}

#counter-display {
  font-size: 72px;
  font-weight: 400;
  font-family: monospace;
  transition: all 0.3s;
  line-height: 1;
}

#controls {
  margin-top: 1rem;
}

.plain-btn {
  background: none;
  border: 1px solid #ccc;
  color: #111;
  padding: 4px 14px;
  font-size: 18px;
  cursor: pointer;
  margin: 0 4px;
  border-radius: 3px;
  font-family: monospace;
}
.plain-btn:hover { background: #f5f5f5; }

#sub-label {
  font-size: 11px;
  color: #bbb;
  margin-top: 0.5rem;
  font-family: monospace;
}

.sixseven-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  display: none;
}
.sixseven-bg span {
  position: absolute;
  font-weight: 900;
  animation: bgFloat linear infinite;
  opacity: 0.2;
  font-family: monospace;
}
@keyframes bgFloat {
  0%   { transform: translateY(100vh) rotate(0deg); }
  100% { transform: translateY(-120vh) rotate(360deg); }
}

.chaos-particle {
  position: fixed;
  pointer-events: none;
  font-weight: 900;
  animation: floatUp linear forwards;
  z-index: 9999;
  white-space: nowrap;
  font-family: monospace;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 1; }
  100% { transform: translateY(-120vh) rotate(720deg) scale(2.5); opacity: 0; }
}

.rainbow-text {
  background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #00ffff, #0088ff, #ff00ff, #ff0000);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbowShift 0.5s linear infinite;
}
@keyframes rainbowShift {
  from { background-position: 0% 50%; }
  to   { background-position: 200% 50%; }
}

.explode-text {
  animation: textPulse 0.3s ease-in-out infinite alternate;
}
@keyframes textPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.08); }
}

#closing-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #000;
  z-index: 99999;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 28px;
  color: #fff;
  font-family: monospace;
  text-align: center;
  padding: 2rem;
  line-height: 2;
}
#closing-overlay.show { display: flex; }
</style>
</head>
<body>

<div id="closing-overlay">
  <div id="close-msg"></div>
</div>

<div class="sixseven-bg" id="bgContainer"></div>

<div id="app">
  <div id="label">counter</div>
  <div id="counter-display">0</div>
  <div id="controls">
    <button class="plain-btn" id="btnMinus" onclick="change(-1)">-</button>
    <button class="plain-btn" id="btnPlus"  onclick="change(1)">+</button>
  </div>
  <div id="sub-label"></div>
</div>

<script>
let count = 0;
let exploded = false;
const MAGIC = 67;
const colors = ['#ff0055','#ff8800','#ffee00','#00ff88','#00cfff','#cc44ff','#ff44aa','#ffffff'];
const bgs    = ['#1a0033','#003300','#001a33','#330000','#1a1a00','#003322','#220033','#001111'];

function change(d) {
  if (exploded) return;
  count += d;
  if (count < 0) count = 0;
  document.getElementById('counter-display').textContent = count;
  if (count === MAGIC) triggerExplosion();
}

function triggerExplosion() {
  exploded = true;

  const app         = document.getElementById('app');
  const display     = document.getElementById('counter-display');
  const bgContainer = document.getElementById('bgContainer');
  const subLabel    = document.getElementById('sub-label');
  const label       = document.getElementById('label');

  document.getElementById('btnMinus').style.display = 'none';
  document.getElementById('btnPlus').style.display  = 'none';

  bgContainer.style.display = 'block';

  label.innerHTML    = '<span class="rainbow-text" style="font-size:18px;font-weight:900;">🔥 SESSANTASETTE 🔥</span>';
  subLabel.innerHTML = '<span class="rainbow-text">IL NUMERO PROIBITO</span>';

  display.classList.add('rainbow-text', 'explode-text');
  display.style.fontSize   = '100px';
  display.style.fontWeight = '900';

  const bgInterval = setInterval(() => {
    const chars  = ['67','67','67','六七','LXVII','67!','✦67✦','⚡67⚡'];
    const clrs   = ['#ff0055','#ff8800','#ffee00','#00ff88','#00cfff','#cc44ff'];
    for (let i = 0; i < 6; i++) {
      const s = document.createElement('span');
      s.textContent             = chars[Math.floor(Math.random() * chars.length)];
      s.style.left              = Math.random() * 100 + '%';
      s.style.bottom            = '-10%';
      s.style.fontSize          = (14 + Math.random() * 40) + 'px';
      s.style.color             = clrs[Math.floor(Math.random() * clrs.length)];
      s.style.animationDuration = (3 + Math.random() * 5) + 's';
      s.style.animationDelay    = Math.random() * 2 + 's';
      bgContainer.appendChild(s);
    }
    if (bgContainer.children.length > 200)
      bgContainer.removeChild(bgContainer.children[0]);
  }, 200);

  const particleInterval = setInterval(() => {
    const texts = ['67','67!!','SESSANTASETTE','67°','✦67✦','#67','[67]','67!','67?!'];
    const p = document.createElement('div');
    p.className              = 'chaos-particle';
    p.textContent            = texts[Math.floor(Math.random() * texts.length)];
    p.style.left             = Math.random() * 95 + '%';
    p.style.top              = (50 + Math.random() * 50) + '%';
    p.style.fontSize         = (12 + Math.random() * 36) + 'px';
    p.style.color            = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (1.5 + Math.random() * 3) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }, 120);

  let bgIdx = 0;
  const bgCycle = setInterval(() => {
    document.body.style.background = bgs[bgIdx % bgs.length];
    bgIdx++;
  }, 400);

  const displayTexts = ['67','SESSANTASETTE','67','THE NUMBER','67','TUFF','67','❗67❗'];
  let dtIdx = 0;
  const textCycle = setInterval(() => {
    display.textContent    = displayTexts[dtIdx % displayTexts.length];
    display.style.fontSize = (80 + Math.random() * 80) + 'px';
    dtIdx++;
  }, 300);

  setTimeout(() => {
    clearInterval(bgInterval);
    clearInterval(particleInterval);
    clearInterval(bgCycle);
    clearInterval(textCycle);
    startClosing();
  }, 8000);
}

function selfDestruct() {
  // Prova a chiudere la tab (funziona se aperta via window.open)
  window.close();

  // Fallback: rimpiazza l'intera pagina con una schermata nera vuota
  // usando document.open/write che resetta completamente il documento
  setTimeout(() => {
    try {
      document.open();
      document.write('');
      document.close();
      document.documentElement.remove();
    } catch(e) {}

    // Ultimo fallback: body completamente svuotato e nero
    document.body.innerHTML = '';
    document.body.style.cssText = 'background:#000;margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;';
    document.title = '';
  }, 100);
}

function startClosing() {
  const overlay = document.getElementById('closing-overlay');
  const msg     = document.getElementById('close-msg');
  overlay.classList.add('show');

  const lines = [
    'hai scoperto il segreto.',
    'nessuno doveva sapere.',
    'addio.',
  ];

  let li = 0;
  msg.innerHTML = '';

  const lineInterval = setInterval(() => {
    if (li < lines.length) {
      msg.innerHTML += lines[li] + '<br>';
      li++;
    } else {
      clearInterval(lineInterval);
      let dots = 0;
      const dotInterval = setInterval(() => {
        dots++;
        msg.innerHTML = msg.innerHTML.replace(/\.+$/, '') + '.'.repeat(Math.min(dots, 5));
        if (dots >= 5) {
          clearInterval(dotInterval);
          setTimeout(() => {
            msg.innerHTML += '<br><br><span style="font-size:14px;opacity:0.5;">( il sito si è autodistrutto )</span>';
            setTimeout(selfDestruct, 2000);
          }, 500);
        }
      }, 500);
    }
  }, 700);
}
</script>
</body>
</html>
